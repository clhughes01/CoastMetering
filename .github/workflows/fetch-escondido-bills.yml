# Escondido Water bill fetcher — for local use only.
# The login page often shows reCAPTCHA; the script has no captcha automation.
# Run locally: npm run fetch-escondido-bills (solve captcha manually if shown).
# This workflow is kept for manual runs only; scheduled run disabled.
name: Fetch Escondido bills
on:
  workflow_dispatch:      # Manual run only (no schedule)
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Fetch Escondido bills (local-only script; captcha may block in CI)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" npm run fetch-escondido-bills
        env:
          PLAYWRIGHT_HEADED: "1"
          ESCONDIDO_LOGIN_EMAIL: ${{ secrets.ESCONDIDO_LOGIN_EMAIL }}
          ESCONDIDO_LOGIN_PASSWORD: ${{ secrets.ESCONDIDO_LOGIN_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Upload debug artifacts (when 0 bills or trace from CI)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: escondido-debug
          path: |
            debug-escondido.png
            debug-escondido.html
            trace.zip
