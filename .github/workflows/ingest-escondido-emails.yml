# Escondido bill email ingest — runs via GitHub Actions (no Vercel cron).
# IMAP → fetch email → parse account info from email body → fetch invoice link → follow View Invoice → save bill.
name: Ingest Escondido bill emails
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run Escondido email ingest
        env:
          ESCONDIDO_INGEST_DEBUG: "1"
          DEBUG_OUTPUT_FILE: "${{ github.workspace }}/escondido-ingest-debug.log"
          ESCONDIDO_IMAP_HOST: ${{ secrets.ESCONDIDO_IMAP_HOST }}
          ESCONDIDO_IMAP_USER: ${{ secrets.ESCONDIDO_IMAP_USER }}
          ESCONDIDO_IMAP_PASSWORD: ${{ secrets.ESCONDIDO_IMAP_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/run-escondido-email-ingest.ts

      - name: Upload debug log
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: escondido-ingest-debug
          path: escondido-ingest-debug.log
